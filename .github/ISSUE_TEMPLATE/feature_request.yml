name: Feature Request
description: Suggest a new feature or improvement
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
      placeholder: I frequently need to... but currently I have to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
      placeholder: |
        A `<NewComponent>` that accepts `prop` and renders...

        ```tsx
        <NewComponent variant="solid" />
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've considered.

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New Component
        - Component Enhancement
        - Token/Theme
        - Documentation
        - Tooling/DX
        - Other
