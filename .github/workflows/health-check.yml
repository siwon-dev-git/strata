name: Weekly Health Check

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday 09:00 UTC (18:00 KST)
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  health:
    name: System Health Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-strata

      - name: Check outdated dependencies
        id: outdated
        run: |
          OUTPUT=$(pnpm outdated --format json 2>/dev/null || echo '{}')
          COUNT=$(echo "$OUTPUT" | node -e "
            const j = require('fs').readFileSync('/dev/stdin','utf8');
            try { console.log(Object.keys(JSON.parse(j)).length); }
            catch { console.log(0); }
          ")
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" > /tmp/outdated.json

      - name: Run test snapshot
        id: tests
        run: |
          OUTPUT=$(pnpm test:ci 2>&1) || true
          PASSED=$(echo "$OUTPUT" | grep -oP '\d+ passed' | head -1 || echo "0 passed")
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"

      - name: Bundle size snapshot
        id: bundle
        run: |
          pnpm build > /dev/null 2>&1
          SIZE=$(du -sk dist | cut -f1)
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"

      - name: Check component count
        id: components
        run: |
          COUNT=$(find src/components -mindepth 2 -maxdepth 2 -type d | wc -l | tr -d ' ')
          STORIES=$(find src -name "*.stories.tsx" 2>/dev/null | wc -l | tr -d ' ')
          echo "components=$COUNT" >> "$GITHUB_OUTPUT"
          echo "stories=$STORIES" >> "$GITHUB_OUTPUT"

      - name: Create health report issue
        uses: actions/github-script@v7
        with:
          script: |
            const outdated = parseInt('${{ steps.outdated.outputs.count }}') || 0;
            const tests = '${{ steps.tests.outputs.passed }}';
            const bundle = '${{ steps.bundle.outputs.size }}';
            const components = '${{ steps.components.outputs.components }}';
            const stories = '${{ steps.components.outputs.stories }}';

            const warnings = [];
            if (outdated > 10) warnings.push(`- 🔴 ${outdated} outdated dependencies`);
            else if (outdated > 5) warnings.push(`- 🟡 ${outdated} outdated dependencies`);
            if (parseInt(bundle) > 400) warnings.push(`- 🟡 Bundle at ${bundle}KB — approaching 512KB budget`);

            const status = warnings.length === 0 ? '✅ All systems healthy' : '⚠️ Action needed';

            const body = [
              `## ${status}`,
              '',
              '| Metric | Value |',
              '|--------|-------|',
              `| Components | ${components} |`,
              `| Stories | ${stories} |`,
              `| Tests | ${tests} |`,
              `| Bundle | ${bundle}KB / 512KB |`,
              `| Outdated deps | ${outdated} |`,
              '',
              warnings.length > 0 ? '### Warnings\n' + warnings.join('\n') : '',
              '',
              `> Auto-generated by [health-check.yml](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/workflows/health-check.yml)`,
            ].filter(Boolean).join('\n');

            // Close previous health check issues
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'health-check',
              state: 'open',
            });

            for (const issue of issues) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Health Check — ${new Date().toISOString().split('T')[0]}`,
              body,
              labels: ['health-check'],
            });
