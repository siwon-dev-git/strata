name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  # ── Quality Gate ─────────────────────────────────
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-strata

      - name: Format
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test:ci

  # ── Publish to npm (OIDC trusted publishing) ────
  publish:
    name: Publish to npm
    needs: quality
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-strata
        # setup-strata uses setup-node; re-run with registry-url for npm auth
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json ($PKG_VERSION)"
            exit 1
          fi
          echo "Publishing v$PKG_VERSION"

      - name: Determine dist-tag
        id: dist-tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if echo "$PKG_VERSION" | grep -qE '(alpha|beta|rc)'; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build library
        run: pnpm build:lib

      - name: Publish
        run: pnpm publish --access public --no-git-checks --provenance --tag ${{ steps.dist-tag.outputs.tag }}

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              generate_release_notes: true,
            });
