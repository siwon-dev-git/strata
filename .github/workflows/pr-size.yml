name: PR Size Label

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

permissions:
  pull-requests: write

jobs:
  label:
    name: Auto-label PR size
    runs-on: ubuntu-latest

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { additions, deletions } = context.payload.pull_request;
            const total = additions + deletions;

            const sizes = [
              { label: 'size/XS', max: 10 },
              { label: 'size/S',  max: 50 },
              { label: 'size/M',  max: 200 },
              { label: 'size/L',  max: 500 },
              { label: 'size/XL', max: Infinity },
            ];

            const match = sizes.find(s => total <= s.max);
            const allLabels = sizes.map(s => s.label);

            // Remove existing size labels
            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            for (const l of currentLabels.filter(l => allLabels.includes(l.name))) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: l.name,
              });
            }

            // Add new label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [match.label],
            });

            // Warn on large PRs
            if (total > 500) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `⚠️ **Large PR** (+${additions} -${deletions} = ${total} lines). Consider splitting into smaller PRs.`,
              });
            }
