name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.claude/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Quality Gate ─────────────────────────────────
  # Single job: format → lint → typecheck → test → build
  # One checkout + setup instead of three.
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-strata

      - name: Format
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test:ci

      - name: Build
        run: pnpm build

      - name: Bundle size
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          BUNDLE_KB: ${{ steps.build.outputs.size }}
        with:
          script: |
            const { execSync } = require('child_process');
            const size = execSync(
              `grep -oE 'assets/[^"]+' dist/index.html | while read f; do wc -c < "dist/$f"; done | awk '{sum+=$1} END {print int(sum/1024)}'`
            ).toString().trim();
            const kb = parseInt(size);
            const status = kb > 512 ? '🔴' : kb > 400 ? '🟡' : '✅';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${status} **Bundle (entry):** ${kb}KB / 512KB budget`,
            });

  # ── PR Checks ────────────────────────────────────
  # Size label + dependency review. Only on pull_request.
  pr-checks:
    name: PR Checks
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Label PR size
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const stat = execSync(
              `git diff --numstat origin/main...HEAD -- ':!*lock*' | awk '{a+=$1; d+=$2} END {print a, d}'`
            ).toString().trim().split(' ');
            const additions = parseInt(stat[0]) || 0;
            const deletions = parseInt(stat[1]) || 0;
            const total = additions + deletions;

            const sizes = [
              { label: 'size/XS', max: 10 },
              { label: 'size/S',  max: 50 },
              { label: 'size/M',  max: 200 },
              { label: 'size/L',  max: 500 },
              { label: 'size/XL', max: Infinity },
            ];

            const match = sizes.find(s => total <= s.max);
            const allLabels = sizes.map(s => s.label);

            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            for (const l of currentLabels.filter(l => allLabels.includes(l.name))) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: l.name,
              });
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [match.label],
            });

            if (total > 500) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `⚠️ **Large PR** (+${additions} -${deletions} = ${total} lines). Consider splitting into smaller PRs.`,
              });
            }
